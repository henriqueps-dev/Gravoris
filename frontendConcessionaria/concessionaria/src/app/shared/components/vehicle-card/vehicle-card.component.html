<article class="vehicle-card" appScrollReveal>
  <div class="card-image-wrap">
    <img [src]="vehicle().image" [alt]="vehicle().name" loading="lazy" />
    <span class="brand-tag">{{ vehicle().brand }}</span>
    <button
      type="button"
      class="favorite-btn"
      [class.active]="isFavorite()"
      (click)="toggleFavorite($event)"
      aria-label="Favoritar"
    >
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
      </svg>
    </button>
  </div>
  <div class="card-body">
    <h3>{{ vehicle().name }}</h3>
    <div class="specs">
      <div class="spec">
        <span class="label">Ano</span>
        <span class="value">{{ vehicle().year }}</span>
      </div>
      <div class="spec">
        <span class="label">Potência</span>
        <span class="value">{{ vehicle().power }} cv</span>
      </div>
      <div class="spec">
        <span class="label">V. máx.</span>
        <span class="value">{{ vehicle().topSpeed }} km/h</span>
      </div>
    </div>
    <p class="price">{{ formatPrice(vehicle().price) }}</p>
    <a [routerLink]="['/veiculo', vehicle().id]" class="btn-details">Ver Detalhes</a>
  </div>
</article>
