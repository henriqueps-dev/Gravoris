@if (authModal.visible()) {
  <div class="modal-backdrop" (click)="close()" role="presentation">
    <div class="modal-panel" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <button type="button" class="modal-close" (click)="close()" aria-label="Fechar">×</button>

      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 15v2M12 9v2M12 3a9 9 0 100 18 9 9 0 000-18z" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>

      <h2 id="auth-modal-title">Acesso necessário</h2>
      <p>Entre na sua conta para adicionar veículos ao carrinho.</p>

      <div class="modal-actions">
        <a routerLink="/login" class="btn-primary" (click)="close()">Fazer Login</a>
        <a routerLink="/cadastro" class="btn-secondary" (click)="close()">Criar Conta</a>
        <button type="button" class="btn-ghost" (click)="close()">Continuar Navegando</button>
      </div>
    </div>
  </div>
}
