<div class="brand-bar-wrapper">
  <div class="brand-bar">
    @for (brand of brands; track brand) {
      <button
        type="button"
        class="brand-item"
        [class.active]="isActive(brand)"
        (click)="selectBrand(brand)"
      >
        {{ brand }}
      </button>
    }
  </div>
</div>
