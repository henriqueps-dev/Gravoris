
<div class="hero-section">

  <video autoplay muted loop playsinline class="background-video">
    <source [src]="currentVideo" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <header class="header">

    <div class="menu-area">
      <div class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <p>MENU</p>
    </div>

    <div class="logo">
      GRAVORIS
    </div>

    <div class="store-area">
      <p>Loja</p>

      <svg xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor">

        <path stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M3 3h18l-1 18H4L3 3zm5 0V1h8v2" />

      </svg>
    </div>

  </header>

  <div class="hero-content">

    <h1>
      O luxo não é apenas um detalhe.
    </h1>

    <p>
      Descubra uma seleção exclusiva de superesportivos <br> e veículos premium criados para quem exige potência,<br> elegância e sofisticação em cada detalhe.
    </p>

    <button>
      EXPLORAR VEÍCULOS
    </button>

  </div>


</div>

<section class="espe">
  <div></div>
</section>
